---
# Decision Environment per EDA (build con ansible-builder).
# Include il source plugin custom controller_jobs e le collection di supporto.
version: 3

images:
  base_image:
    name: 'registry.redhat.io/ansible-automation-platform-24/de-minimal-rhel8:latest'

dependencies:
  galaxy: ../collections/requirements.yml
  python: 
    - six
    - psutil
  system:
    - iputils [platform:rpm]
  python_interpreter:
    package_system: "python39"

options:
  package_manager_path: /usr/bin/microdnf