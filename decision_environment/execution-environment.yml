---
# Decision Environment per EDA (build con ansible-builder).
# Include il source plugin custom controller_jobs e le collection di supporto.
version: 3

images:
  base_image:
    name: registry.redhat.io/ansible-automation-platform-26/de-supported-rhel9:latest

dependencies:
  galaxy: ../collections/requirements.yml
  python: ../requirements.txt
  system: []

additional_build_files:
  - src: ../extensions
    dest: extensions

additional_build_steps:
  append_final:
    # Rende il source plugin custom individuabile da ansible-rulebook.
    - COPY _build/extensions /usr/share/ansible/collections/ansible_collections/local/eda/extensions
    - RUN echo "Decision Environment EDA workflow-orchestrator pronto"
